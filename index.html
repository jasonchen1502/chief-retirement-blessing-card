<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>官長退休祝福卡片</title>
    <link rel="stylesheet" href="styles.css?v=20260707b">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-card" aria-label="官長退休祝福卡片">
        <div class="hero-image-wrap">
          <img
            class="hero-image"
            src="assets/chief-retirement-hero.png"
            alt="祝福官長退休快樂主視覺"
          >
        </div>

        <div class="card-copy">
          <p class="kicker">給敬愛的官長</p>
          <h1>榮退誌喜，感謝一路照顧</h1>
          <p class="lead">
            謝謝您多年來的帶領、提醒與照拂，讓每一段共事時光都成為珍貴回憶。願退休後的日子自在從容，日日平安，處處有新的風景。
          </p>

          <div class="gift-row" aria-label="退休祝福">
            <article class="gift-note">
              <span class="gift-icon book" aria-hidden="true"></span>
              <div>
                <h2>留下回憶</h2>
                <p>把大家想說的感謝與祝福，收進這本溫暖的紀念冊。</p>
              </div>
            </article>
            <article class="gift-note">
              <span class="gift-icon tea" aria-hidden="true"></span>
              <div>
                <h2>展開新程</h2>
                <p>願往後的每一天都有好茶、好心情，也有剛剛好的悠閒。</p>
              </div>
            </article>
          </div>

        </div>
      </section>

      <section class="blessing-board" aria-label="祝福留言">
        <div class="board-header">
          <div>
            <p class="kicker">大家的祝福</p>
            <h2>寫下想給官長的一句話</h2>
          </div>
          <button class="ghost-button" id="copyLinkButton" type="button">複製分享連結</button>
        </div>

        <form class="message-form" id="messageForm">
          <label>
            <span>署名</span>
            <input id="nameInput" name="name" maxlength="16" placeholder="例如：同仁" autocomplete="name">
          </label>
          <label>
            <span>祝福語</span>
            <textarea id="messageInput" name="message" maxlength="110" rows="3" placeholder="寫下祝福..." required></textarea>
          </label>
          <div class="emoji-panel" id="emojiPanel" aria-label="祝福表情包">
            <span class="emoji-panel-label">表情包</span>
            <button class="sticker-button" type="button" data-sticker="thanks" title="感謝"><span class="message-sticker sticker-thanks">感謝</span></button>
            <button class="sticker-button" type="button" data-sticker="cheer" title="慶祝"><span class="message-sticker sticker-cheer">恭喜</span></button>
            <button class="sticker-button" type="button" data-sticker="flower" title="花開"><span class="message-sticker sticker-flower">花開</span></button>
            <button class="sticker-button" type="button" data-sticker="tea" title="好茶"><span class="message-sticker sticker-tea">好茶</span></button>
            <button class="sticker-button" type="button" data-sticker="smile" title="微笑"><span class="message-sticker sticker-smile">微笑</span></button>
            <button class="sticker-button" type="button" data-sticker="heart" title="祝福"><span class="message-sticker sticker-heart">祝福</span></button>
            <button class="sticker-button" type="button" data-sticker="sparkle" title="閃耀"><span class="message-sticker sticker-sparkle">閃耀</span></button>
            <button class="sticker-button" type="button" data-sticker="green" title="自在"><span class="message-sticker sticker-green">自在</span></button>
          </div>
          <div class="form-actions">
            <button class="primary-button" type="submit">送出祝福</button>
            <button class="ghost-button" id="exportButton" type="button">匯出祝福</button>
            <label class="file-button">
              匯入祝福
              <input id="importInput" type="file" accept="application/json">
            </label>
          </div>
        </form>

        <div class="share-output" id="shareOutput" aria-live="polite"></div>
        <div class="messages-grid" id="messagesGrid" aria-live="polite"></div>
      </section>
    </main>

    <script src="script.js?v=20260707b"></script>
  </body>
</html>
